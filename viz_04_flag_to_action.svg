<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>Every flag becomes an action with an owner</title>
  <desc>Each item the Playbook flags maps to a clear next step: treatment gaps to follow-up, missing records to a request, pre-existing conditions to attorney escalation, and key facts into the demand.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#a9b0bd"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">STEP 3 · ACT</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">Every flag becomes an action with an owner</text>

  <text x="84" y="168" font-size="12.5" font-weight="700" letter-spacing="1.5" fill="#8a93a3">PLAYBOOK FLAGS</text>
  <text x="704" y="168" font-size="12.5" font-weight="700" letter-spacing="1.5" fill="#8a93a3">YOUR TEAM’S NEXT STEP</text>

  <!-- Row 1 -->
  <rect x="80" y="188" width="400" height="64" rx="12" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="116" cy="220" r="7" fill="#f6a609"/>
  <text x="138" y="226" font-size="17" font-weight="700" fill="#14233b">Treatment gap</text>
  <path d="M492 220 H694" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <rect x="704" y="188" width="416" height="64" rx="12" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="740" cy="220" r="15" fill="#e6f7ee"/>
  <path d="M733 220 l5 5 l9 -10" stroke="#15b371" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="766" y="226" font-size="16.5" fill="#14233b">Open client / provider follow-up</text>

  <!-- Row 2 -->
  <rect x="80" y="274" width="400" height="64" rx="12" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="116" cy="306" r="7" fill="#f6a609"/>
  <text x="138" y="312" font-size="17" font-weight="700" fill="#14233b">Missing record</text>
  <path d="M492 306 H694" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <rect x="704" y="274" width="416" height="64" rx="12" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="740" cy="306" r="15" fill="#e6f7ee"/>
  <path d="M733 306 l5 5 l9 -10" stroke="#15b371" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="766" y="312" font-size="16.5" fill="#14233b">Trigger a records request</text>

  <!-- Row 3 -->
  <rect x="80" y="360" width="400" height="64" rx="12" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="116" cy="392" r="7" fill="#f6a609"/>
  <text x="138" y="398" font-size="17" font-weight="700" fill="#14233b">Pre-existing condition</text>
  <path d="M492 392 H694" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <rect x="704" y="360" width="416" height="64" rx="12" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="740" cy="392" r="15" fill="#e6f7ee"/>
  <path d="M733 392 l5 5 l9 -10" stroke="#15b371" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="766" y="398" font-size="16.5" fill="#14233b">Escalate to the attorney</text>

  <!-- Row 4 -->
  <rect x="80" y="446" width="400" height="64" rx="12" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="116" cy="478" r="7" fill="#316cf4"/>
  <text x="138" y="484" font-size="17" font-weight="700" fill="#14233b">Key facts &amp; opportunities</text>
  <path d="M492 478 H694" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <rect x="704" y="446" width="416" height="64" rx="12" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="740" cy="478" r="15" fill="#e6f7ee"/>
  <path d="M733 478 l5 5 l9 -10" stroke="#15b371" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="766" y="484" font-size="16.5" fill="#14233b">Feed straight into the demand</text>

  <!-- caption -->
  <rect x="50" y="560" width="1100" height="70" rx="14" fill="#e8f0fe"/>
  <text x="76" y="595" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">A sorted to-do list. </tspan>The Playbook’s output isn’t a report to read — it’s next steps,</text>
  <text x="76" y="618" font-size="16" fill="#3f5170">and the insights push back into your CMS, where the work already happens.</text>
</svg>
