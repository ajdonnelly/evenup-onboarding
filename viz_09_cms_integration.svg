<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>AI Playbooks run inside your case-management system</title>
  <desc>The AI Playbook reads and writes directly within the firm's existing case-management system, such as Litify, SmartAdvocate, or CASEpeer — no new app to learn.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
    <marker id="arwS" markerWidth="9" markerHeight="8" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#9fb6f5"/></marker>
    <marker id="arwSb" markerWidth="9" markerHeight="8" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#9fb6f5"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="56" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">WORKS INSIDE YOUR CMS</text>
  <text x="50" y="98" font-size="29" font-weight="800" fill="#14233b">Playbooks run where your team already works</text>

  <!-- hub -->
  <rect x="110" y="300" width="250" height="150" rx="18" fill="#316cf4" filter="url(#sh)"/>
  <path d="M235 326 L240 342 L256 347 L240 352 L235 368 L230 352 L214 347 L230 342 Z" fill="#ffffff"/>
  <text x="235" y="406" text-anchor="middle" font-size="21" font-weight="800" fill="#ffffff">AI Playbook</text>
  <rect x="188" y="422" width="94" height="28" rx="14" fill="#ffffff" opacity="0.20"/>
  <text x="235" y="441" text-anchor="middle" font-size="13.5" font-weight="600" fill="#ffffff">on Piai</text>

  <!-- two-way connector hub <-> bus -->
  <path d="M360 375 H700" stroke="#9fb6f5" stroke-width="2.6" fill="none" marker-start="url(#arwS)" marker-end="url(#arwSb)"/>
  <text x="530" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#7c8aa3">reads &amp; writes in place</text>
  <!-- vertical bus + stubs -->
  <path d="M700 261 V489" stroke="#dbe2ee" stroke-width="2.6" fill="none"/>
  <path d="M700 261 H752" stroke="#dbe2ee" stroke-width="2.6" fill="none"/>
  <path d="M700 375 H752" stroke="#dbe2ee" stroke-width="2.6" fill="none"/>
  <path d="M700 489 H752" stroke="#dbe2ee" stroke-width="2.6" fill="none"/>

  <!-- CMS chip 1: Litify -->
  <rect x="760" y="216" width="380" height="90" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <rect x="786" y="236" width="50" height="50" rx="12" fill="#eef1f6"/>
  <text x="811" y="269" text-anchor="middle" font-size="24" font-weight="800" fill="#316cf4">L</text>
  <text x="856" y="255" font-size="20" font-weight="800" fill="#14233b">Litify</text>
  <text x="856" y="278" font-size="13" fill="#8a93a3">Case management system</text>

  <!-- CMS chip 2: SmartAdvocate -->
  <rect x="760" y="330" width="380" height="90" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <rect x="786" y="350" width="50" height="50" rx="12" fill="#eef1f6"/>
  <text x="811" y="383" text-anchor="middle" font-size="24" font-weight="800" fill="#316cf4">S</text>
  <text x="856" y="369" font-size="20" font-weight="800" fill="#14233b">SmartAdvocate</text>
  <text x="856" y="392" font-size="13" fill="#8a93a3">Case management system</text>

  <!-- CMS chip 3: CASEpeer -->
  <rect x="760" y="444" width="380" height="90" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <rect x="786" y="464" width="50" height="50" rx="12" fill="#eef1f6"/>
  <text x="811" y="497" text-anchor="middle" font-size="24" font-weight="800" fill="#316cf4">C</text>
  <text x="856" y="483" font-size="20" font-weight="800" fill="#14233b">CASEpeer</text>
  <text x="856" y="506" font-size="13" fill="#8a93a3">Case management system</text>

  <text x="950" y="560" text-anchor="middle" font-size="13.5" fill="#8a93a3">… and more, via integration</text>

  <!-- caption -->
  <rect x="50" y="612" width="1090" height="64" rx="14" fill="#e8f0fe"/>
  <text x="76" y="650" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">No new app to learn. </tspan>Playbooks operate inside the system your team already uses every day.</text>
</svg>
