<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>Infuse your firm's AI rules into the automation</title>
  <desc>Bake your firm's security rules, data-handling requirements, and firm rules and SOPs into the Playbook automation, so every review runs the way your firm requires — consistent, compliant, and trusted.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b7bdc9"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">CONFIGURE · GOVERNANCE &amp; SECURITY</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">Infuse your firm’s AI rules into the automation</text>

  <text x="50" y="146" font-size="12.5" font-weight="700" letter-spacing="1.5" fill="#8a93a3">WHAT TO BAKE IN</text>

  <!-- connectors into hub -->
  <path d="M370 225 C 420 225, 430 330, 470 330" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M370 381 H470" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M370 537 C 420 537, 430 432, 470 432" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <!-- hub to outcome -->
  <path d="M860 381 H896" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>

  <!-- bucket 1: security -->
  <rect x="50" y="160" width="320" height="130" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="96" cy="225" r="22" fill="#e8f0fe"/>
  <path d="M96 212 l13 4 v8 c0 8 -6 12 -13 16 c-7 -4 -13 -8 -13 -16 v-8 z" fill="none" stroke="#316cf4" stroke-width="2" stroke-linejoin="round"/>
  <rect x="90" y="224" width="12" height="9" rx="1.5" fill="none" stroke="#316cf4" stroke-width="1.6"/>
  <path d="M92 224 v-2 a4 4 0 0 1 8 0 v2" fill="none" stroke="#316cf4" stroke-width="1.6"/>
  <text x="132" y="218" font-size="17" font-weight="800" fill="#14233b">Security rules</text>
  <text x="132" y="242" font-size="13" fill="#5b6573">access controls · approved use</text>

  <!-- bucket 2: data -->
  <rect x="50" y="316" width="320" height="130" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="96" cy="381" r="22" fill="#e8f0fe"/>
  <ellipse cx="96" cy="372" rx="13" ry="4.5" fill="none" stroke="#316cf4" stroke-width="2"/>
  <path d="M83 372 V392" stroke="#316cf4" stroke-width="2"/>
  <path d="M109 372 V392" stroke="#316cf4" stroke-width="2"/>
  <path d="M83 392 a13 4.5 0 0 0 26 0" fill="none" stroke="#316cf4" stroke-width="2"/>
  <path d="M83 382 a13 4.5 0 0 0 26 0" fill="none" stroke="#316cf4" stroke-width="2"/>
  <text x="132" y="374" font-size="17" font-weight="800" fill="#14233b">Data handling</text>
  <text x="132" y="398" font-size="13" fill="#5b6573">PHI · retention · what’s in scope</text>

  <!-- bucket 3: firm rules -->
  <rect x="50" y="472" width="320" height="130" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="96" cy="537" r="22" fill="#e8f0fe"/>
  <rect x="86" y="525" width="20" height="26" rx="3" fill="none" stroke="#316cf4" stroke-width="2"/>
  <rect x="92" y="521" width="8" height="6" rx="2" fill="#316cf4"/>
  <path d="M90 537 l3 3 l6 -7" stroke="#316cf4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M90 546 h12" stroke="#316cf4" stroke-width="2" stroke-linecap="round"/>
  <text x="132" y="530" font-size="17" font-weight="800" fill="#14233b">Firm rules &amp; SOPs</text>
  <text x="132" y="554" font-size="13" fill="#5b6573">escalation · what “complete” means</text>

  <!-- hub -->
  <rect x="470" y="301" width="390" height="160" rx="18" fill="#316cf4" filter="url(#sh)"/>
  <path d="M665 330 L670 346 L686 351 L670 356 L665 372 L660 356 L644 351 L660 346 Z" fill="#ffffff"/>
  <text x="665" y="408" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff">Your firm’s Playbook</text>
  <text x="665" y="434" text-anchor="middle" font-size="13.5" fill="#dbe6ff">governed, by design</text>

  <!-- outcome -->
  <rect x="896" y="276" width="254" height="210" rx="16" fill="#ffffff" stroke="#cfe8da" filter="url(#sh)"/>
  <text x="922" y="312" font-size="15" font-weight="800" fill="#14233b">Every review is…</text>
  <circle cx="932" cy="348" r="13" fill="#e6f7ee"/><path d="M926 348 l4 4 l8 -9" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="954" y="353" font-size="15" fill="#14233b">Consistent</text>
  <circle cx="932" cy="386" r="13" fill="#e6f7ee"/><path d="M926 386 l4 4 l8 -9" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="954" y="391" font-size="15" fill="#14233b">Compliant</text>
  <circle cx="932" cy="424" r="13" fill="#e6f7ee"/><path d="M926 424 l4 4 l8 -9" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="954" y="429" font-size="15" fill="#14233b">Auditable</text>
  <rect x="922" y="452" width="210" height="18" rx="9" fill="#eafaf0"/>
  <text x="932" y="465" font-size="11.5" font-weight="700" fill="#15a564">Safe to adopt firm-wide</text>

  <!-- caption -->
  <rect x="50" y="636" width="1100" height="56" rx="14" fill="#e8f0fe"/>
  <text x="76" y="670" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">Your rules, built in. </tspan>Bake security, data handling, and firm rules into the automation so it runs the way your firm requires.</text>
</svg>
