<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>The key outputs an AI Playbook generates</title>
  <desc>Five outputs appear on every case: key facts extracted, risk flags raised, high-value opportunities identified, line-level citations, and a run history and audit trail.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">WHAT THE PLAYBOOK GENERATES</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">The outputs you’ll see on every case</text>

  <!-- Card 1: Key facts (x=50,y=150) -->
  <rect x="50" y="150" width="348" height="210" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="96" cy="200" r="22" fill="#e8f0fe"/>
  <rect x="87" y="188" width="18" height="24" rx="3" fill="none" stroke="#316cf4" stroke-width="2"/>
  <path d="M92 195 H100 M92 200 H100 M92 205 H97" stroke="#316cf4" stroke-width="2" stroke-linecap="round"/>
  <text x="84" y="258" font-size="19" font-weight="800" fill="#14233b">Key facts extracted</text>
  <text x="84" y="290" font-size="14" fill="#5b6573">Injuries, providers, treatment</text>
  <text x="84" y="312" font-size="14" fill="#5b6573">dates, and billed amounts.</text>

  <!-- Card 2: Risk flags (x=426,y=150) -->
  <rect x="426" y="150" width="348" height="210" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="472" cy="200" r="22" fill="#fdeccf"/>
  <path d="M472 188 L484 209 L460 209 Z" fill="none" stroke="#f6a609" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M472 196 V202" stroke="#f6a609" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="472" cy="206" r="1.5" fill="#f6a609"/>
  <text x="460" y="258" font-size="19" font-weight="800" fill="#14233b">Risk flags raised</text>
  <text x="460" y="290" font-size="14" fill="#5b6573">Treatment gaps, missing records,</text>
  <text x="460" y="312" font-size="14" fill="#5b6573">and pre-existing conditions.</text>

  <!-- Card 3: Opportunities (x=802,y=150) -->
  <rect x="802" y="150" width="348" height="210" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="848" cy="200" r="22" fill="#e6f7ee"/>
  <path d="M848 210 V191 M841 198 L848 190 L855 198" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="836" y="258" font-size="19" font-weight="800" fill="#14233b">High-value opportunities</text>
  <text x="836" y="290" font-size="14" fill="#5b6573">Added case value the file</text>
  <text x="836" y="312" font-size="14" fill="#5b6573">supports — surfaced early.</text>

  <!-- Card 4: Citations (x=238,y=388) -->
  <rect x="238" y="388" width="348" height="210" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="284" cy="438" r="22" fill="#e8f0fe"/>
  <path d="M277 427 h14 v22 l-7 -6 l-7 6 z" fill="none" stroke="#316cf4" stroke-width="2" stroke-linejoin="round"/>
  <text x="272" y="496" font-size="19" font-weight="800" fill="#14233b">Line-level citations</text>
  <text x="272" y="528" font-size="14" fill="#5b6573">Every output traced back</text>
  <text x="272" y="550" font-size="14" fill="#5b6573">to the exact source line.</text>

  <!-- Card 5: Run history (x=614,y=388) -->
  <rect x="614" y="388" width="348" height="210" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="660" cy="438" r="22" fill="#eef1f5"/>
  <circle cx="660" cy="438" r="11" fill="none" stroke="#5b6573" stroke-width="2"/>
  <path d="M660 438 V431 M660 438 L665 441" stroke="#5b6573" stroke-width="2" stroke-linecap="round"/>
  <text x="648" y="496" font-size="19" font-weight="800" fill="#14233b">Run history &amp; audit trail</text>
  <text x="648" y="528" font-size="14" fill="#5b6573">When each Playbook ran</text>
  <text x="648" y="550" font-size="14" fill="#5b6573">and what it produced.</text>

  <!-- caption -->
  <rect x="50" y="628" width="1100" height="56" rx="14" fill="#e8f0fe"/>
  <text x="76" y="662" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">Read the case in seconds. </tspan>Five outputs that help you understand it, spot risk, and act.</text>
</svg>
