<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Playbook Insights in your CMS — animated</title>
<style>
  body { margin:0; background:#eef1f5; font-family:Inter,system-ui,Arial,sans-serif; }
  .wrap { max-width:1000px; margin:32px auto; padding:0 16px; }
  .frame { position:relative; width:100%; aspect-ratio:1200/720; overflow:hidden;
           border-radius:18px; background:#ffffff; box-shadow:0 14px 40px rgba(20,35,74,.18); }
  .cam { width:100%; height:100%; transform-origin:50% 50%;
         animation: cam 11s cubic-bezier(.45,0,.2,1) infinite; }
  .cam svg { display:block; width:100%; height:100%; }
  @keyframes cam {
    0%   { transform:scale(1.04); transform-origin:50% 50%; }
    26%  { transform:scale(1.04); transform-origin:50% 50%; }
    54%  { transform:scale(1.78); transform-origin:78% 53%; }
    90%  { transform:scale(1.78); transform-origin:78% 53%; }
    100% { transform:scale(1.04); transform-origin:50% 50%; }
  }
  .cap { text-align:center; color:#5b6573; font-size:13px; margin-top:14px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="frame">
      <div class="cam">
        <svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, Arial, sans-serif">
          <defs>
            <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#1b2a4a" flood-opacity="0.12"/>
            </filter>
          </defs>
          <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

          <text x="50" y="56" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">IN YOUR CMS</text>
          <text x="50" y="98" font-size="29" font-weight="800" fill="#14233b">Playbook findings, right where your team works</text>

          <rect x="50" y="130" width="1100" height="500" rx="14" fill="#ffffff" stroke="#e2e6ee" filter="url(#sh)"/>
          <path d="M64 130 H1136 a14 14 0 0 1 14 14 V176 H50 V144 a14 14 0 0 1 14 -14 Z" fill="#eef1f5"/>
          <circle cx="78" cy="153" r="5" fill="#ff5f57"/>
          <circle cx="96" cy="153" r="5" fill="#febc2e"/>
          <circle cx="114" cy="153" r="5" fill="#28c840"/>
          <text x="600" y="158" text-anchor="middle" font-size="13" fill="#8a93a3">Lakefront Injury Group — Case Management</text>

          <text x="84" y="224" font-size="22" font-weight="800" fill="#14233b">Johnson v. Rivera</text>
          <rect x="300" y="206" width="158" height="24" rx="12" fill="#e6f7ee"/>
          <text x="312" y="223" font-size="12" font-weight="700" fill="#15a564">Active · Motor Vehicle</text>
          <text x="84" y="248" font-size="13" fill="#8a93a3">Case #2026-0418</text>
          <line x1="84" y1="266" x2="720" y2="266" stroke="#eef1f5" stroke-width="2"/>

          <text x="84" y="302" font-size="11" font-weight="700" letter-spacing="1" fill="#9aa3b2">CLIENT</text>
          <text x="84" y="324" font-size="15" fill="#aeb6c2">Marcus Johnson</text>
          <text x="84" y="364" font-size="11" font-weight="700" letter-spacing="1" fill="#9aa3b2">DATE OF INCIDENT</text>
          <text x="84" y="386" font-size="15" fill="#aeb6c2">January 4, 2026</text>
          <text x="84" y="426" font-size="11" font-weight="700" letter-spacing="1" fill="#9aa3b2">MATTER TYPE</text>
          <text x="84" y="448" font-size="15" fill="#aeb6c2">Motor vehicle — rear-end collision</text>
          <text x="84" y="488" font-size="11" font-weight="700" letter-spacing="1" fill="#9aa3b2">TREATING PROVIDERS</text>
          <text x="84" y="510" font-size="15" fill="#aeb6c2">Lakeshore Imaging · Dr. Patel · City ER</text>

          <rect x="760" y="196" width="360" height="372" rx="14" fill="#ffffff" stroke="#cdd9fb" filter="url(#sh)"/>
          <path d="M774 196 H1106 a14 14 0 0 1 14 14 V250 H760 V210 a14 14 0 0 1 14 -14 Z" fill="#f2f6ff"/>
          <path d="M788 212 l3 9 l9 3 l-9 3 l-3 9 l-3 -9 l-9 -3 l9 -3 Z" fill="#316cf4"/>
          <text x="806" y="229" font-size="16" font-weight="800" fill="#316cf4">AI Playbook Insights</text>
          <text x="786" y="272" font-size="12" fill="#8a93a3">Updated 2 min ago · 4 findings</text>

          <!-- highlight on treatment-gap row -->
          <rect x="770" y="294" width="334" height="42" rx="10" fill="#316cf4" fill-opacity="0.10" stroke="#316cf4" stroke-width="2" opacity="0">
            <animate attributeName="opacity" dur="11s" repeatCount="indefinite"
                     keyTimes="0;0.66;0.78;0.95;1" values="0;0;1;1;0"/>
          </rect>

          <circle cx="794" cy="312" r="6" fill="#f6a609"/>
          <text x="812" y="317" font-size="15" font-weight="700" fill="#14233b">Treatment gap — 6 weeks</text>
          <rect x="812" y="326" width="118" height="22" rx="11" fill="#f3f5f8"/>
          <text x="826" y="341" font-size="11" font-weight="600" fill="#5b6573">source · p.142, ln 8</text>

          <circle cx="794" cy="372" r="6" fill="#f6a609"/>
          <text x="812" y="377" font-size="15" font-weight="700" fill="#14233b">Missing record — Dr. Patel</text>
          <rect x="812" y="386" width="118" height="22" rx="11" fill="#f3f5f8"/>
          <text x="826" y="401" font-size="11" font-weight="600" fill="#5b6573">request record</text>

          <circle cx="794" cy="432" r="6" fill="#f6a609"/>
          <text x="812" y="437" font-size="15" font-weight="700" fill="#14233b">Prior injury noted</text>
          <rect x="812" y="446" width="118" height="22" rx="11" fill="#f3f5f8"/>
          <text x="826" y="461" font-size="11" font-weight="600" fill="#5b6573">review · escalate</text>

          <circle cx="794" cy="492" r="11" fill="#e6f7ee"/>
          <path d="M788 492 l4 4 l7 -8" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="812" y="497" font-size="15" font-weight="700" fill="#14233b">12 key facts captured</text>
          <rect x="812" y="506" width="118" height="22" rx="11" fill="#eafaf0"/>
          <text x="826" y="521" font-size="11" font-weight="600" fill="#15a564">view in case</text>

          <rect x="50" y="650" width="1100" height="52" rx="14" fill="#e8f0fe"/>
          <text x="76" y="682" font-size="16" fill="#3f5170">Visible where the work happens — relevant outputs in the CMS earn adoption and trust.</text>

          <!-- click pulse -->
          <circle cx="905" cy="316" r="4" fill="none" stroke="#316cf4" stroke-width="3" opacity="0">
            <animate attributeName="r" dur="11s" repeatCount="indefinite" keyTimes="0;0.7;0.78;1" values="4;4;26;26"/>
            <animate attributeName="opacity" dur="11s" repeatCount="indefinite" keyTimes="0;0.7;0.72;0.82;1" values="0;0;0.7;0;0"/>
          </circle>

          <!-- cursor -->
          <g opacity="0">
            <animate attributeName="opacity" dur="11s" repeatCount="indefinite" keyTimes="0;0.30;0.34;0.95;1" values="0;0;1;1;0"/>
            <animateTransform attributeName="transform" type="translate" dur="11s" repeatCount="indefinite"
              keyTimes="0;0.28;0.55;0.72;0.95;1"
              values="1085 548; 1085 548; 970 386; 905 316; 905 316; 1085 548"
              calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
            <path d="M0 0 L0 27 L7 20 L12 29 L16 27 L11 18 L20 18 Z" fill="#1a2330" stroke="#ffffff" stroke-width="1.5"/>
          </g>
        </svg>
      </div>
    </div>
    <p class="cap">Auto-playing loop · pan to the Playbook Insights panel, then the cursor lands on the flagged treatment gap.</p>
  </div>
</body>
</html>
