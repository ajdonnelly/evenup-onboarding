<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>A clear record of every analysis</title>
  <desc>An audit trail of Playbook runs: a Playbook Results history listing each run by name and timestamp, with a record of when each ran, what it generated, and who it ran for.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#1b2a4a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">STEP 5 · AUDIT TRAIL</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">A clear record of every analysis</text>

  <!-- Playbook Results card -->
  <rect x="50" y="160" width="700" height="340" rx="16" fill="#ffffff" stroke="#e2e6ee" filter="url(#sh)"/>
  <text x="84" y="212" font-size="20" font-weight="800" fill="#14233b">Playbook Results</text>
  <text x="716" y="210" text-anchor="end" font-size="12" font-weight="700" letter-spacing="0.5" fill="#8a93a3">LAST RUN ↓</text>
  <line x1="84" y1="232" x2="716" y2="232" stroke="#eef0f4" stroke-width="2"/>

  <text x="84" y="288" font-size="15.5" font-weight="600" fill="#316cf4">Avery Monroe · Stage 1: Intake &amp; Screening</text>
  <text x="716" y="288" text-anchor="end" font-size="14" fill="#5b6573">Mar 2, 2026 · 4:03 PM</text>
  <line x1="84" y1="314" x2="716" y2="314" stroke="#f1f3f6" stroke-width="1.5"/>

  <text x="84" y="360" font-size="15.5" font-weight="600" fill="#316cf4">Avery Monroe · Bad Facts / Key Facts</text>
  <text x="716" y="360" text-anchor="end" font-size="14" fill="#5b6573">Mar 2, 2026 · 10:08 AM</text>
  <line x1="84" y1="386" x2="716" y2="386" stroke="#f1f3f6" stroke-width="1.5"/>

  <text x="84" y="432" font-size="15.5" font-weight="600" fill="#316cf4">Avery Monroe · Ongoing Claim Review</text>
  <text x="716" y="432" text-anchor="end" font-size="14" fill="#5b6573">Feb 19, 2026 · 11:02 AM</text>
  <line x1="84" y1="458" x2="716" y2="458" stroke="#f1f3f6" stroke-width="1.5"/>

  <text x="84" y="486" font-size="12.5" fill="#9aa3b2">Every run logged automatically — nothing lost.</text>

  <!-- side panel: what's logged -->
  <rect x="780" y="160" width="370" height="340" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <text x="812" y="208" font-size="18" font-weight="800" fill="#14233b">What’s logged</text>
  <line x1="812" y1="228" x2="1118" y2="228" stroke="#eef0f4" stroke-width="2"/>

  <circle cx="824" cy="272" r="14" fill="#e6f7ee"/><path d="M817 272 l5 5 l9 -11" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="850" y="277" font-size="15.5" fill="#14233b">When each Playbook ran</text>

  <circle cx="824" cy="322" r="14" fill="#e6f7ee"/><path d="M817 322 l5 5 l9 -11" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="850" y="327" font-size="15.5" fill="#14233b">What it generated</text>

  <circle cx="824" cy="372" r="14" fill="#e6f7ee"/><path d="M817 372 l5 5 l9 -11" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="850" y="377" font-size="15.5" fill="#14233b">Who it ran for</text>

  <rect x="812" y="430" width="220" height="34" rx="17" fill="#eafaf0"/>
  <text x="830" y="452" font-size="13.5" font-weight="700" fill="#15a564">Auditable &amp; exportable</text>

  <!-- caption -->
  <rect x="50" y="600" width="1100" height="64" rx="14" fill="#e8f0fe"/>
  <text x="76" y="639" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">One clear history. </tspan>Track when playbooks run and what they generated — a defensible record on every case.</text>
</svg>
