<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>Verify in seconds with line-level citations</title>
  <desc>Each flag the Playbook raises links to the exact source line. Click the citation and confirm it against the record in seconds.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">STEP 2 · VERIFY</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">Verify in seconds with line-level citations</text>

  <!-- connector from citation to highlighted line -->
  <path d="M320 372 C 470 372, 500 332, 632 332" stroke="#316cf4" stroke-width="2.5" stroke-dasharray="6 6" fill="none"/>
  <circle cx="632" cy="332" r="5" fill="#316cf4"/>

  <!-- flag card -->
  <rect x="50" y="190" width="430" height="235" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <path d="M86 222 v40 M86 224 h26 l-6 9 l6 9 h-26" fill="#f6a609" stroke="#f6a609" stroke-width="2" stroke-linejoin="round"/>
  <text x="122" y="236" font-size="13" font-weight="700" letter-spacing="1" fill="#8a93a3">FLAGGED BY THE PLAYBOOK</text>
  <text x="84" y="298" font-size="23" font-weight="800" fill="#14233b">6-week treatment gap</text>
  <text x="84" y="326" font-size="15" fill="#5b6573">between ER visit and first follow-up</text>
  <rect x="84" y="350" width="236" height="42" rx="21" fill="#ffffff" stroke="#316cf4" stroke-width="1.5"/>
  <path d="M104 365 a7 7 0 0 1 10 0 l4 4 a7 7 0 0 1 -10 10 M116 379 a7 7 0 0 1 -10 0 l-4 -4 a7 7 0 0 1 10 -10" stroke="#316cf4" stroke-width="2" fill="none"/>
  <text x="128" y="376" font-size="14.5" font-weight="700" fill="#316cf4">source · p.142, ln 8</text>

  <!-- source document card -->
  <rect x="640" y="150" width="510" height="320" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <rect x="672" y="178" width="34" height="42" rx="5" fill="#eef0f6" stroke="#cfd4de"/>
  <path d="M680 190 h18 M680 199 h18 M680 208 h12" stroke="#9aa3b2" stroke-width="2" stroke-linecap="round"/>
  <text x="720" y="196" font-size="15" font-weight="700" fill="#14233b">ER Discharge note</text>
  <text x="720" y="215" font-size="13" fill="#8a93a3">03/04/2026</text>
  <line x1="672" y1="234" x2="1118" y2="234" stroke="#eef0f4" stroke-width="2"/>

  <rect x="672" y="252" width="410" height="11" rx="5.5" fill="#eaedf2"/>
  <rect x="672" y="276" width="446" height="11" rx="5.5" fill="#eaedf2"/>
  <!-- highlighted cited line -->
  <rect x="660" y="300" width="478" height="40" rx="8" fill="#e8f0fe"/>
  <text x="676" y="325" font-size="14.5" font-weight="600" fill="#1c50d4">Pt. to follow up in 1–2 weeks; returned at 6 weeks.</text>
  <rect x="672" y="356" width="396" height="11" rx="5.5" fill="#eaedf2"/>
  <rect x="672" y="380" width="300" height="11" rx="5.5" fill="#eaedf2"/>

  <circle cx="690" cy="430" r="16" fill="#e6f7ee"/>
  <path d="M683 430 l5 5 l9 -11" stroke="#15b371" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="716" y="436" font-size="16" font-weight="700" fill="#14233b">Citation matches the record</text>

  <!-- caption -->
  <rect x="50" y="648" width="1100" height="56" rx="14" fill="#e8f0fe"/>
  <text x="76" y="682" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">Trust, fast. </tspan>Every fact and flag traces to the exact source line — click the citation and confirm in seconds.</text>
</svg>
