<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>Route every flag to the right person</title>
  <desc>Validated Playbook flags are routed to the right owner — case manager, attorney, or records team — each with a follow-up automatically triggered, so every insight ends in a concrete next step.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b7bdc9"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">ACT ON FINDINGS · ROUTE &amp; TRIGGER</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">Route every flag to the right person</text>

  <!-- fan connectors -->
  <path d="M290 366 C 400 366, 430 196, 552 196" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M290 366 H552" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M290 366 C 400 366, 430 536, 552 536" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>

  <!-- validated flags -->
  <rect x="50" y="226" width="240" height="280" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <text x="74" y="282" font-size="17" font-weight="800" fill="#14233b">Validated flags</text>
  <text x="74" y="303" font-size="12" fill="#8a93a3">confirmed in review</text>
  <line x1="74" y1="320" x2="266" y2="320" stroke="#eef0f4" stroke-width="2"/>
  <circle cx="90" cy="356" r="11" fill="#e6f7ee"/><path d="M85 356 l4 4 l7 -8" stroke="#15b371" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="112" y="361" font-size="15" fill="#14233b">Treatment gap</text>
  <circle cx="90" cy="402" r="11" fill="#e6f7ee"/><path d="M85 402 l4 4 l7 -8" stroke="#15b371" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="112" y="407" font-size="15" fill="#14233b">Pre-existing condition</text>
  <circle cx="90" cy="448" r="11" fill="#e6f7ee"/><path d="M85 448 l4 4 l7 -8" stroke="#15b371" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="112" y="453" font-size="15" fill="#14233b">Missing record</text>

  <!-- owner 1: case manager -->
  <rect x="560" y="121" width="590" height="150" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="612" cy="196" r="24" fill="#eef1f6"/>
  <circle cx="612" cy="189" r="7" fill="#9aa3b2"/>
  <path d="M597 211 a15 12 0 0 1 30 0 z" fill="#9aa3b2"/>
  <text x="650" y="172" font-size="18" font-weight="800" fill="#14233b">Case Manager</text>
  <text x="650" y="196" font-size="13.5" fill="#5b6573">Treatment gap → schedule client follow-up</text>
  <rect x="650" y="212" width="178" height="30" rx="15" fill="#eafaf0"/>
  <text x="668" y="232" font-size="13" font-weight="700" fill="#15a564">Follow-up triggered</text>

  <!-- owner 2: attorney -->
  <rect x="560" y="291" width="590" height="150" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="612" cy="366" r="24" fill="#eef1f6"/>
  <circle cx="612" cy="359" r="7" fill="#9aa3b2"/>
  <path d="M597 381 a15 12 0 0 1 30 0 z" fill="#9aa3b2"/>
  <text x="650" y="342" font-size="18" font-weight="800" fill="#14233b">Attorney</text>
  <text x="650" y="366" font-size="13.5" fill="#5b6573">Pre-existing condition → review for causation</text>
  <rect x="650" y="382" width="120" height="30" rx="15" fill="#e8f0fe"/>
  <text x="668" y="402" font-size="13" font-weight="700" fill="#316cf4">Escalated</text>

  <!-- owner 3: records team -->
  <rect x="560" y="461" width="590" height="150" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="612" cy="536" r="24" fill="#eef1f6"/>
  <circle cx="612" cy="529" r="7" fill="#9aa3b2"/>
  <path d="M597 551 a15 12 0 0 1 30 0 z" fill="#9aa3b2"/>
  <text x="650" y="512" font-size="18" font-weight="800" fill="#14233b">Records Team</text>
  <text x="650" y="536" font-size="13.5" fill="#5b6573">Missing record → records request</text>
  <rect x="650" y="552" width="140" height="30" rx="15" fill="#eafaf0"/>
  <text x="668" y="572" font-size="13" font-weight="700" fill="#15a564">Request sent</text>

  <!-- caption -->
  <rect x="50" y="636" width="1100" height="56" rx="14" fill="#e8f0fe"/>
  <text x="76" y="670" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">Validation is just the beginning. </tspan>Every insight ends in a concrete next step, owned by the right person.</text>
</svg>
