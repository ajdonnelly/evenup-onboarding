<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>A high-risk flag lands in your CMS</title>
  <desc>The AI Playbook flags a high-risk missing-care issue and writes it automatically to the CMS. The learner's next moves are to verify the finding, take action, and route it to the right person.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#1b2a4a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">STEP 1 · IDENTIFY</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">A high-risk flag just landed in your CMS</text>

  <!-- alert card -->
  <rect x="50" y="160" width="690" height="330" rx="16" fill="#ffffff" stroke="#e2e6ee" filter="url(#sh)"/>
  <rect x="50" y="172" width="6" height="306" rx="3" fill="#e5484d"/>
  <rect x="84" y="190" width="120" height="28" rx="14" fill="#fdecec"/>
  <text x="144" y="209" text-anchor="middle" font-size="12.5" font-weight="800" fill="#d83a3a">HIGH RISK</text>
  <text x="218" y="209" font-size="13" fill="#8a93a3">flagged by AI Playbook</text>

  <text x="84" y="272" font-size="23" font-weight="800" fill="#14233b">Missing care — 6-week gap in treatment</text>
  <text x="84" y="302" font-size="15" fill="#5b6573">Avery Monroe · Motor-vehicle matter</text>
  <line x1="84" y1="328" x2="706" y2="328" stroke="#eef0f4" stroke-width="2"/>

  <circle cx="98" cy="368" r="14" fill="#e6f7ee"/><path d="M91 368 l5 5 l9 -11" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="122" y="373" font-size="15" fill="#14233b">Automatically written to your CMS</text>

  <rect x="84" y="410" width="186" height="30" rx="15" fill="#f3f5f8"/>
  <text x="100" y="430" font-size="13" font-weight="600" fill="#5b6573">source · p.142, ln 8</text>
  <rect x="286" y="410" width="178" height="30" rx="15" fill="#fdeccf"/>
  <text x="302" y="430" font-size="13" font-weight="700" fill="#c47f12">Status: needs review</text>

  <!-- next steps panel -->
  <rect x="770" y="160" width="380" height="330" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <text x="800" y="206" font-size="18" font-weight="800" fill="#14233b">What should you do next?</text>
  <line x1="800" y1="226" x2="1120" y2="226" stroke="#eef0f4" stroke-width="2"/>

  <circle cx="816" cy="272" r="15" fill="#316cf4"/><text x="816" y="277" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">1</text>
  <text x="844" y="270" font-size="16" font-weight="700" fill="#14233b">Verify the finding</text>
  <text x="844" y="290" font-size="13" fill="#8a93a3">check it against the source</text>

  <circle cx="816" cy="334" r="15" fill="#316cf4"/><text x="816" y="339" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">2</text>
  <text x="844" y="332" font-size="16" font-weight="700" fill="#14233b">Take action</text>
  <text x="844" y="352" font-size="13" fill="#8a93a3">open the follow-up</text>

  <circle cx="816" cy="396" r="15" fill="#316cf4"/><text x="816" y="401" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">3</text>
  <text x="844" y="394" font-size="16" font-weight="700" fill="#14233b">Route it</text>
  <text x="844" y="414" font-size="13" fill="#8a93a3">to the right owner</text>

  <text x="800" y="462" font-size="13" font-weight="700" fill="#316cf4">↓ The rest of this lesson</text>

  <!-- caption -->
  <rect x="50" y="560" width="1100" height="64" rx="14" fill="#e8f0fe"/>
  <text x="76" y="599" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">Identify. </tspan>The Playbook surfaces a high-risk issue and writes it back to your CMS automatically — now it’s your move.</text>
</svg>
