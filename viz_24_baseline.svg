<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>Measure the baseline before AI</title>
  <desc>Understand the workflow before AI on three factors — quality, time to completion, and complexity (staff involved) — so the Playbook's improvement over the baseline is clear and provable.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b7bdc9"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">MEASURE THE BASELINE</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">Know the “before” to prove the “after”</text>

  <!-- column headers -->
  <text x="84" y="184" font-size="12" font-weight="700" letter-spacing="1.2" fill="#8a93a3">FACTOR</text>
  <text x="565" y="184" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="1.2" fill="#c47f12">BEFORE AI · BASELINE</text>
  <text x="928" y="184" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="1.2" fill="#15a564">WITH PLAYBOOK</text>

  <!-- Row 1: Quality -->
  <rect x="50" y="200" width="1100" height="96" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="96" cy="248" r="22" fill="#e8f0fe"/>
  <path d="M96 236 L99 245 L108 245 L101 251 L104 260 L96 254 L88 260 L91 251 L84 245 L93 245 Z" fill="#316cf4"/>
  <text x="132" y="243" font-size="17" font-weight="800" fill="#14233b">Quality</text>
  <text x="132" y="265" font-size="12.5" fill="#8a93a3">accuracy &amp; consistency</text>
  <rect x="425" y="230" width="280" height="36" rx="18" fill="#fdeccf"/>
  <text x="565" y="253" text-anchor="middle" font-size="13.5" font-weight="600" fill="#c47f12">Varies by person &amp; day</text>
  <path d="M712 248 H770" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <rect x="778" y="230" width="300" height="36" rx="18" fill="#eafaf0"/>
  <text x="928" y="253" text-anchor="middle" font-size="13.5" font-weight="700" fill="#15a564">Consistent, source-checked</text>

  <!-- Row 2: Time -->
  <rect x="50" y="312" width="1100" height="96" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="96" cy="360" r="22" fill="#e8f0fe"/>
  <circle cx="96" cy="360" r="11" fill="none" stroke="#316cf4" stroke-width="2"/>
  <path d="M96 360 V353 M96 360 L101 363" stroke="#316cf4" stroke-width="2" stroke-linecap="round"/>
  <text x="132" y="355" font-size="17" font-weight="800" fill="#14233b">Time to completion</text>
  <text x="132" y="377" font-size="12.5" fill="#8a93a3">from intake to done</text>
  <rect x="425" y="342" width="280" height="36" rx="18" fill="#fdeccf"/>
  <text x="565" y="365" text-anchor="middle" font-size="13.5" font-weight="700" fill="#c47f12">≈ 9 days</text>
  <path d="M712 360 H770" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <rect x="778" y="342" width="300" height="36" rx="18" fill="#eafaf0"/>
  <text x="928" y="365" text-anchor="middle" font-size="13.5" font-weight="700" fill="#15a564">≈ 2 days</text>

  <!-- Row 3: Complexity -->
  <rect x="50" y="424" width="1100" height="96" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="96" cy="472" r="22" fill="#e8f0fe"/>
  <circle cx="90" cy="467" r="5" fill="#316cf4"/><path d="M81 480 a9 7 0 0 1 18 0 z" fill="#316cf4"/>
  <circle cx="103" cy="469" r="4.5" fill="#7ea2f4"/><path d="M95 480 a8 6 0 0 1 16 0 z" fill="#7ea2f4"/>
  <text x="132" y="467" font-size="17" font-weight="800" fill="#14233b">Complexity</text>
  <text x="132" y="489" font-size="12.5" fill="#8a93a3">staff involved</text>
  <rect x="425" y="454" width="280" height="36" rx="18" fill="#fdeccf"/>
  <text x="565" y="477" text-anchor="middle" font-size="13.5" font-weight="600" fill="#c47f12">3–4 people touch it</text>
  <path d="M712 472 H770" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <rect x="778" y="454" width="300" height="36" rx="18" fill="#eafaf0"/>
  <text x="928" y="477" text-anchor="middle" font-size="13.5" font-weight="700" fill="#15a564">1 person, AI-assisted</text>

  <!-- caption -->
  <rect x="50" y="600" width="1100" height="64" rx="14" fill="#e8f0fe"/>
  <text x="76" y="639" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">Set the baseline first. </tspan>Measure quality, time, and complexity before AI — so the improvement is clear and provable to the firm.</text>
</svg>
