<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif"><title>Manual review versus an AI Playbook</title><desc>The old way relies on manual review when someone gets to a file, so quality varies and issues slip through. With an AI Playbook every case is reviewed the moment it arrives, consistently, with risks flagged early and time freed for higher-value work.</desc><defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/></filter></defs><rect x="0" y="0" width="1200" height="720" fill="#ffffff"/><text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">OLD WAY  vs  PLAYBOOK</text><text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">Manual review leaves gaps. A Playbook doesn’t.</text><!--LEFT: old way--><rect x="60" y="150" width="510" height="410" rx="18" fill="#f7f8fa" stroke="#e7e9f0"/><text x="92" y="198" font-size="22" font-weight="800" fill="#5b6573">The old way</text><text x="92" y="222" font-size="14" fill="#8a93a3">manual review — when someone gets to it</text><line x1="92" y1="244" x2="538" y2="244" stroke="#e7e9f0" stroke-width="2"/><g><circle cx="104" cy="304" r="14" fill="#edf0f4"/><path d="M98 298 L110 310 M110 298 L98 310" stroke="#9aa3b2" stroke-width="2.5" stroke-linecap="round"/><text x="132" y="309" font-size="16" fill="#5b6573">Reviewed only when a file is opened</text></g><g><circle cx="104" cy="366" r="14" fill="#edf0f4"/><path d="M98 360 L110 372 M110 360 L98 372" stroke="#9aa3b2" stroke-width="2.5" stroke-linecap="round"/><text x="132" y="371" font-size="16" fill="#5b6573">Quality varies by person and by day</text></g><g><circle cx="104" cy="428" r="14" fill="#edf0f4"/><path d="M98 422 L110 434 M110 422 L98 434" stroke="#9aa3b2" stroke-width="2.5" stroke-linecap="round"/><text x="132" y="433" font-size="16" fill="#5b6573">Issues surface late — or slip through</text></g><g><circle cx="104" cy="490" r="14" fill="#edf0f4"/><path d="M98 484 L110 496 M110 484 L98 496" stroke="#9aa3b2" stroke-width="2.5" stroke-linecap="round"/><text x="132" y="495" font-size="16" fill="#5b6573">Hours lost to first-pass reading</text></g><!--RIGHT: with a playbook--><rect x="630" y="150" width="510" height="410" rx="18" fill="#ffffff" stroke="#cdd9fb" filter="url(#sh)"/><rect x="630" y="150" width="6" height="410" rx="3" fill="#316cf4"/><text x="668" y="198" font-size="22" font-weight="800" fill="#316cf4">With an AI Playbook</text><text x="668" y="222" font-size="14" fill="#5b6573">automatic — on every case</text><line x1="668" y1="244" x2="1108" y2="244" stroke="#eef0f4" stroke-width="2"/><g><circle cx="680" cy="304" r="14" fill="#e6f7ee"/><path d="M673 304 l5 5 l9 -10" stroke="#15b371" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="708" y="309" font-size="16" font-weight="600" fill="#14233b">Reviewed the moment it arrives</text></g><g><circle cx="680" cy="366" r="14" fill="#e6f7ee"/><path d="M673 366 l5 5 l9 -10" stroke="#15b371" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="708" y="371" font-size="16" font-weight="600" fill="#14233b">Consistent on every single file</text></g><g><circle cx="680" cy="428" r="14" fill="#e6f7ee"/><path d="M673 428 l5 5 l9 -10" stroke="#15b371" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="708" y="433" font-size="16" font-weight="600" fill="#14233b">Risks &amp; gaps flagged early</text></g><g><circle cx="680" cy="490" r="14" fill="#e6f7ee"/><path d="M673 490 l5 5 l9 -10" stroke="#15b371" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="708" y="495" font-size="16" font-weight="600" fill="#14233b">Time freed for higher-value work</text></g><!--vs badge--><circle cx="600" cy="355" r="26" fill="#ffffff" stroke="#d6dbe4" stroke-width="2"/><text x="600" y="362" text-anchor="middle" font-size="15" font-weight="700" fill="#8a93a3">vs</text><!--caption--><rect x="60" y="600" width="1080" height="64" rx="14" fill="#e8f0fe"/><text x="86" y="639" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">Same team, fewer cracks. </tspan>Nothing slips through, and the hours go to the work that moves cases.</text></svg>