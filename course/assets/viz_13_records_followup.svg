<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>AI agents chase records automatically</title>
  <desc>An AI agent runs the records-request follow-up cadence automatically — calls, emails, and portal checks on a schedule until records arrive — freeing the team to work up the case and saving about four hours per case.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b7bdc9"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">RECORDS · AUTOMATED FOLLOW-UP</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">Get records without the chase</text>

  <!-- top flow -->
  <path d="M388 205 H442" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M750 205 H804" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>

  <rect x="168" y="150" width="220" height="110" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <rect x="196" y="180" width="30" height="38" rx="5" fill="#eef0f6" stroke="#cfd4de"/>
  <path d="M203 192 h16 M203 200 h16 M203 208 h10" stroke="#9aa3b2" stroke-width="2" stroke-linecap="round"/>
  <text x="238" y="200" font-size="16" font-weight="700" fill="#14233b">Records request</text>
  <text x="238" y="222" font-size="13" fill="#5b6573">sent to the provider</text>

  <rect x="450" y="150" width="300" height="110" rx="16" fill="#316cf4" filter="url(#sh)"/>
  <rect x="490" y="186" width="34" height="30" rx="7" fill="none" stroke="#ffffff" stroke-width="2.4"/>
  <line x1="507" y1="180" x2="507" y2="186" stroke="#ffffff" stroke-width="2.4"/>
  <circle cx="507" cy="178" r="2.4" fill="#ffffff"/>
  <circle cx="499" cy="201" r="2.4" fill="#ffffff"/>
  <circle cx="515" cy="201" r="2.4" fill="#ffffff"/>
  <text x="544" y="200" font-size="18" font-weight="800" fill="#ffffff">AI Agent</text>
  <text x="544" y="222" font-size="13" fill="#dbe6ff">auto follow-up</text>

  <rect x="812" y="150" width="240" height="110" rx="14" fill="#ffffff" stroke="#cfe8da" filter="url(#sh)"/>
  <circle cx="852" cy="205" r="17" fill="#e6f7ee"/>
  <path d="M844 205 l5 6 l11 -13" stroke="#15b371" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="880" y="200" font-size="15.5" font-weight="800" fill="#14233b">Records received</text>
  <text x="880" y="222" font-size="13" fill="#5b6573">into your CMS</text>

  <!-- cadence card -->
  <rect x="50" y="320" width="1100" height="190" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <text x="84" y="358" font-size="17" font-weight="800" fill="#14233b">Follow-up cadence — handled automatically</text>
  <text x="84" y="380" font-size="13.5" fill="#5b6573">Calls, emails, and portal checks on a schedule until records arrive. No nudging from your team.</text>

  <line x1="150" y1="442" x2="1010" y2="442" stroke="#dbe2ee" stroke-width="3"/>

  <circle cx="150" cy="442" r="13" fill="#e6f7ee"/><path d="M144 442 l4 4 l8 -9" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="150" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="#14233b">Day 1</text>
  <text x="150" y="496" text-anchor="middle" font-size="12" fill="#8a93a3">Request sent</text>

  <circle cx="365" cy="442" r="13" fill="#e6f7ee"/><path d="M359 442 l4 4 l8 -9" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="365" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="#14233b">Day 4</text>
  <text x="365" y="496" text-anchor="middle" font-size="12" fill="#8a93a3">Call</text>

  <circle cx="580" cy="442" r="13" fill="#e6f7ee"/><path d="M574 442 l4 4 l8 -9" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="580" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="#14233b">Day 9</text>
  <text x="580" y="496" text-anchor="middle" font-size="12" fill="#8a93a3">Email</text>

  <circle cx="795" cy="442" r="13" fill="#e6f7ee"/><path d="M789 442 l4 4 l8 -9" stroke="#15b371" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="795" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="#14233b">Day 14</text>
  <text x="795" y="496" text-anchor="middle" font-size="12" fill="#8a93a3">Call</text>

  <circle cx="1010" cy="442" r="17" fill="#15b371"/><path d="M1001 442 l6 6 l12 -14" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1010" y="482" text-anchor="middle" font-size="13" font-weight="800" fill="#15a564">Records in</text>

  <!-- stat ribbon -->
  <rect x="50" y="600" width="1100" height="74" rx="16" fill="#316cf4"/>
  <text x="92" y="648" font-size="34" font-weight="800" fill="#ffffff">4 hrs</text>
  <text x="196" y="634" font-size="18" font-weight="800" fill="#ffffff">saved per case on follow-ups</text>
  <text x="196" y="657" font-size="13.5" fill="#dbe6ff">Your team focuses on working up the case, not chasing records.</text>
</svg>
