<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif"><title>Validate, act, refine, audit — then roll out firm-wide</title><desc>The lesson loop: validate Playbook outputs, act on insights, refine the Playbook, and audit every run; once it is proven and the team is aligned, roll the workflow out firm-wide.</desc><defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/></filter><marker id="arw" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b7bdc9"/></marker><marker id="arwg" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15b371"/></marker></defs><rect x="0" y="0" width="1200" height="720" fill="#ffffff"/><text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">IN THIS LESSON</text><text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">From validating a flag to firm-wide adoption</text><!--forward arrows--><path d="M246 316 H276" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/><path d="M472 316 H502" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/><path d="M698 316 H728" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/><path d="M924 316 H954" stroke="#15b371" stroke-width="2.5" fill="none" marker-end="url(#arwg)"/><!--iterate loop (Validate→Refine)--><path d="M600 432 V470 Q600 484 586 484 H162 Q148 484 148 470 V434" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/><rect x="290" y="468" width="168" height="32" rx="16" fill="#e8f0fe"/><text x="374" y="489" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1c50d4">iterate until ready</text><!--card 1: validate--><rect x="50" y="200" width="196" height="232" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/><circle cx="148" cy="270" r="24" fill="#e8f0fe"/><circle cx="143" cy="265" r="8.5" fill="none" stroke="#316cf4" stroke-width="2.3"/><path d="M139 265 l3 3 l5 -6" stroke="#316cf4" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/><line x1="150" y1="272" x2="158" y2="280" stroke="#316cf4" stroke-width="2.5" stroke-linecap="round"/><text x="148" y="348" text-anchor="middle" font-size="18" font-weight="800" fill="#14233b">Validate</text><text x="148" y="380" text-anchor="middle" font-size="13" fill="#5b6573">Verify against</text><text x="148" y="399" text-anchor="middle" font-size="13" fill="#5b6573">the source</text><!--card 2: act--><rect x="276" y="200" width="196" height="232" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/><circle cx="374" cy="270" r="24" fill="#e8f0fe"/><path d="M377 256 L365 274 L373 274 L370 286 L384 267 L376 267 Z" fill="#316cf4"/><text x="374" y="348" text-anchor="middle" font-size="18" font-weight="800" fill="#14233b">Act</text><text x="374" y="380" text-anchor="middle" font-size="13" fill="#5b6573">Route to the</text><text x="374" y="399" text-anchor="middle" font-size="13" fill="#5b6573">right owner</text><!--card 3: refine--><rect x="502" y="200" width="196" height="232" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/><circle cx="600" cy="270" r="24" fill="#e8f0fe"/><path d="M609 266 a10 10 0 1 0 2 8" fill="none" stroke="#316cf4" stroke-width="2.3"/><path d="M610 259 l1 8 l-8 -2 z" fill="#316cf4"/><text x="600" y="348" text-anchor="middle" font-size="18" font-weight="800" fill="#14233b">Refine</text><text x="600" y="380" text-anchor="middle" font-size="13" fill="#5b6573">Tune on</text><text x="600" y="399" text-anchor="middle" font-size="13" fill="#5b6573">feedback</text><!--card 4: audit--><rect x="728" y="200" width="196" height="232" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/><circle cx="826" cy="270" r="24" fill="#e8f0fe"/><rect x="816" y="258" width="20" height="24" rx="2" fill="none" stroke="#316cf4" stroke-width="2"/><path d="M821 266 h10 M821 271 h10 M821 276 h6" stroke="#316cf4" stroke-width="1.8" stroke-linecap="round"/><text x="826" y="348" text-anchor="middle" font-size="18" font-weight="800" fill="#14233b">Audit</text><text x="826" y="380" text-anchor="middle" font-size="13" fill="#5b6573">Log every</text><text x="826" y="399" text-anchor="middle" font-size="13" fill="#5b6573">run &amp; change</text><!--card 5: adopt firm-wide--><rect x="954" y="200" width="196" height="232" rx="16" fill="#ffffff" stroke="#cfe8da" stroke-width="2" filter="url(#sh)"/><circle cx="1052" cy="270" r="24" fill="#e6f7ee"/><rect x="1041" y="259" width="11" height="23" rx="1.5" fill="none" stroke="#15b371" stroke-width="2"/><rect x="1054" y="266" width="10" height="16" rx="1.5" fill="none" stroke="#15b371" stroke-width="2"/><path d="M1044 265 h5 M1044 271 h5 M1057 271 h4" stroke="#15b371" stroke-width="1.6" stroke-linecap="round"/><text x="1052" y="348" text-anchor="middle" font-size="16" font-weight="800" fill="#14233b">Adopt firm-wide</text><text x="1052" y="380" text-anchor="middle" font-size="13" fill="#5b6573">Scale what’s</text><text x="1052" y="399" text-anchor="middle" font-size="13" fill="#5b6573">proven</text><!--caption--><rect x="50" y="560" width="1100" height="64" rx="14" fill="#e8f0fe"/><text x="76" y="599" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">From pilot to firm-wide. </tspan>Validate, act, refine, and audit until it’s proven and the team is aligned — then scale it across the firm.</text></svg>