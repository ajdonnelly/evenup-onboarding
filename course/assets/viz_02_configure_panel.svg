<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif"><title>Configure your first AI Playbook</title><desc>Set up a focused first Playbook: run it on one case type, watch for a few high-value flags, and bake in the firm&apos;s SOPs — then it runs automatically on every new case.</desc><defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/></filter><marker id="arw" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b7bdc9"/></marker></defs><rect x="0" y="0" width="1200" height="720" fill="#ffffff"/><text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">CONFIGURE YOUR PLAYBOOK</text><text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">Set up your first Playbook — start narrow</text><!--config card--><rect x="50" y="150" width="620" height="470" rx="18" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/><circle cx="92" cy="190" r="12" fill="#e8f0fe"/><circle cx="92" cy="190" r="4.5" fill="#316cf4"/><text x="116" y="197" font-size="21" font-weight="800" fill="#14233b">Pilot Playbook</text><line x1="82" y1="216" x2="638" y2="216" stroke="#eef0f4" stroke-width="2"/><text x="86" y="252" font-size="12" font-weight="700" letter-spacing="1.5" fill="#8a93a3">RUN ON</text><rect x="86" y="266" width="360" height="44" rx="22" fill="#e8f0fe"/><text x="108" y="294" font-size="16" font-weight="700" fill="#316cf4">New motor-vehicle cases</text><path d="M420 285 l8 8 l8 -8" stroke="#316cf4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="86" y="352" font-size="12" font-weight="700" letter-spacing="1.5" fill="#8a93a3">WATCH FOR</text><g><rect x="86" y="368" width="26" height="26" rx="7" fill="#15b371"/><path d="M93 381 l5 5 l9 -10" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="126" y="388" font-size="16.5" fill="#14233b">Treatment gaps over 30 days</text></g><g><rect x="86" y="410" width="26" height="26" rx="7" fill="#15b371"/><path d="M93 423 l5 5 l9 -10" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="126" y="430" font-size="16.5" fill="#14233b">Missing provider records</text></g><g><rect x="86" y="452" width="26" height="26" rx="7" fill="#15b371"/><path d="M93 465 l5 5 l9 -10" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="126" y="472" font-size="16.5" fill="#14233b">Prior / pre-existing injuries</text></g><text x="86" y="528" font-size="12" font-weight="700" letter-spacing="1.5" fill="#8a93a3">APPLY FIRM SOPs</text><rect x="86" y="542" width="52" height="28" rx="14" fill="#316cf4"/><circle cx="124" cy="556" r="11" fill="#ffffff"/><text x="150" y="561" font-size="15.5" fill="#14233b">On — your standards, baked in</text><!--arrow to result--><path d="M672 385 H760" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/><!--result card--><rect x="770" y="300" width="380" height="170" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/><circle cx="812" cy="352" r="20" fill="#e6f7ee"/><path d="M803 352 l7 7 l12 -14" stroke="#15b371" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="846" y="347" font-size="19" font-weight="800" fill="#14233b">Live on every new case</text><text x="846" y="371" font-size="14.5" fill="#5b6573">Runs automatically from now on</text><rect x="800" y="402" width="150" height="30" rx="15" fill="#eafaf0"/><text x="818" y="422" font-size="13.5" font-weight="700" fill="#15a564">set &amp; forget</text><!--caption--><rect x="50" y="648" width="1100" height="56" rx="14" fill="#e8f0fe"/><text x="76" y="682" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">Crawl, then run. </tspan>Start with one case type and a few high-value flags, then expand on evidence.</text></svg>