<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>How an AI Playbook fits your workflow</title>
  <desc>A new case file enters your case-management system; the AI Playbook runs automatically, surfaces extracted facts, flagged risks, and opportunities, and writes the insights back into the case record — so you always work with the latest information.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b7bdc9"/>
    </marker>
    <marker id="arwb" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#316cf4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="700" fill="#ffffff"/>

  <text x="50" y="60" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">AI PLAYBOOK</text>
  <text x="50" y="102" font-size="29" font-weight="800" fill="#14233b">Every new case, reviewed the moment it arrives</text>

  <!-- forward connectors -->
  <path d="M285 343 H362" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M620 313 C 672 313, 678 232, 712 232" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M620 343 H712" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M620 373 C 672 373, 678 454, 712 454" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>

  <!-- Stage 1: new case file -->
  <rect x="50" y="268" width="235" height="150" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <rect x="78" y="296" width="40" height="50" rx="6" fill="#eef0f6" stroke="#cfd4de"/>
  <path d="M88 312 H108 M88 322 H108 M88 332 H102" stroke="#9aa3b2" stroke-width="2.5" stroke-linecap="round"/>
  <text x="78" y="374" font-size="19" font-weight="700" fill="#14233b">New case file</text>
  <text x="78" y="398" font-size="14.5" fill="#5b6573">added to your CMS</text>

  <!-- Stage 2: hub -->
  <rect x="370" y="243" width="250" height="200" rx="18" fill="#316cf4" filter="url(#sh)"/>
  <path d="M495 270 L500 287 L517 292 L500 297 L495 314 L490 297 L473 292 L490 287 Z" fill="#ffffff"/>
  <text x="495" y="352" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff">AI Playbook</text>
  <rect x="425" y="370" width="140" height="30" rx="15" fill="#ffffff" opacity="0.20"/>
  <text x="495" y="390" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">runs automatically</text>

  <!-- Stage 3: outputs -->
  <rect x="720" y="186" width="330" height="92" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="760" cy="232" r="20" fill="#e6f7ee"/>
  <path d="M751 232 l7 7 l12 -14" stroke="#15b371" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="795" y="227" font-size="19" font-weight="700" fill="#14233b">Key facts extracted</text>
  <text x="795" y="251" font-size="13.5" fill="#5b6573">injuries · providers · bills</text>

  <rect x="720" y="298" width="330" height="92" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="760" cy="344" r="20" fill="#e6f7ee"/>
  <path d="M751 344 l7 7 l12 -14" stroke="#15b371" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="795" y="339" font-size="19" font-weight="700" fill="#14233b">Risks &amp; gaps flagged</text>
  <text x="795" y="363" font-size="13.5" fill="#5b6573">treatment gaps · missing records</text>

  <rect x="720" y="408" width="330" height="92" rx="14" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="760" cy="454" r="20" fill="#e6f7ee"/>
  <path d="M751 454 l7 7 l12 -14" stroke="#15b371" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="795" y="449" font-size="19" font-weight="700" fill="#14233b">Opportunities surfaced</text>
  <text x="795" y="473" font-size="13.5" fill="#5b6573">high-value findings</text>

  <!-- write-back loop -->
  <path d="M885 500 V598 Q885 612 871 612 H181 Q167 612 167 598 V424" stroke="#316cf4" stroke-width="2.5" fill="none" marker-end="url(#arwb)"/>
  <rect x="300" y="595" width="500" height="34" rx="17" fill="#e8f0fe"/>
  <text x="550" y="618" text-anchor="middle" font-size="15" font-weight="600" fill="#1c50d4">Updates the case record in your CMS — right where you work</text>

  <!-- footnote -->
  <text x="50" y="666" font-size="14.5" fill="#5b6573">Nothing overlooked — your team always works with the latest information.</text>
</svg>
