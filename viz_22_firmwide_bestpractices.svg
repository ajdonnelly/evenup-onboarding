<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>From a proven pilot to firm best practices</title>
  <desc>Take the proven pilot, roll it out firm-wide across every case type and team, and bake it into the firm's standard Playbooks, SOPs, and new-hire onboarding.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b7bdc9"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">STEP 6 · FIRM-WIDE ADOPTION</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">From a proven pilot to firm best practices</text>

  <!-- arrows -->
  <path d="M390 320 H430" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M770 320 H810" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>

  <!-- card A: proven pilot -->
  <rect x="50" y="180" width="340" height="280" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="94" cy="228" r="24" fill="#e6f7ee"/>
  <path d="M85 228 l6 6 l12 -14" stroke="#15b371" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="132" y="235" font-size="19" font-weight="800" fill="#14233b">Proven pilot</text>
  <line x1="74" y1="262" x2="366" y2="262" stroke="#eef0f4" stroke-width="2"/>
  <circle cx="92" cy="302" r="11" fill="#e6f7ee"/><path d="M87 302 l4 4 l7 -8" stroke="#15b371" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="116" y="307" font-size="15" fill="#14233b">One case type, proven</text>
  <circle cx="92" cy="342" r="11" fill="#e6f7ee"/><path d="M87 342 l4 4 l7 -8" stroke="#15b371" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="116" y="347" font-size="15" fill="#14233b">Measured time saved</text>
  <circle cx="92" cy="382" r="11" fill="#e6f7ee"/><path d="M87 382 l4 4 l7 -8" stroke="#15b371" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="116" y="387" font-size="15" fill="#14233b">Team trusts the output</text>

  <!-- card B: roll out firm-wide -->
  <rect x="430" y="180" width="340" height="280" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="474" cy="228" r="24" fill="#e8f0fe"/>
  <rect x="463" y="217" width="11" height="23" rx="1.5" fill="none" stroke="#316cf4" stroke-width="2"/>
  <rect x="476" y="224" width="10" height="16" rx="1.5" fill="none" stroke="#316cf4" stroke-width="2"/>
  <path d="M466 223 h5 M466 229 h5 M479 229 h4" stroke="#316cf4" stroke-width="1.6" stroke-linecap="round"/>
  <text x="512" y="235" font-size="19" font-weight="800" fill="#14233b">Roll out firm-wide</text>
  <line x1="454" y1="262" x2="746" y2="262" stroke="#eef0f4" stroke-width="2"/>
  <circle cx="472" cy="302" r="11" fill="#e8f0fe"/><circle cx="472" cy="302" r="4" fill="#316cf4"/>
  <text x="496" y="307" font-size="15" fill="#14233b">All case types</text>
  <circle cx="472" cy="342" r="11" fill="#e8f0fe"/><circle cx="472" cy="342" r="4" fill="#316cf4"/>
  <text x="496" y="347" font-size="15" fill="#14233b">Every team &amp; office</text>
  <circle cx="472" cy="382" r="11" fill="#e8f0fe"/><circle cx="472" cy="382" r="4" fill="#316cf4"/>
  <text x="496" y="387" font-size="15" fill="#14233b">Role-based onboarding</text>

  <!-- card C: firm best practices -->
  <rect x="810" y="180" width="340" height="280" rx="16" fill="#ffffff" stroke="#cfe8da" stroke-width="2" filter="url(#sh)"/>
  <circle cx="854" cy="228" r="24" fill="#e6f7ee"/>
  <path d="M843 218 h10 a2 2 0 0 1 2 2 v18 h-10 a2 2 0 0 0 -2 2 v-20 a2 2 0 0 1 0 -2 z" fill="none" stroke="#15b371" stroke-width="2" stroke-linejoin="round"/>
  <path d="M865 218 h-10 a2 2 0 0 0 -2 2 v18 h10 a2 2 0 0 1 2 2 v-20 a2 2 0 0 0 0 -2 z" fill="none" stroke="#15b371" stroke-width="2" stroke-linejoin="round"/>
  <text x="892" y="235" font-size="18" font-weight="800" fill="#14233b">Firm best practices</text>
  <line x1="834" y1="262" x2="1126" y2="262" stroke="#eef0f4" stroke-width="2"/>
  <circle cx="852" cy="302" r="11" fill="#e6f7ee"/><path d="M847 302 l4 4 l7 -8" stroke="#15b371" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="876" y="307" font-size="15" fill="#14233b">Standard Playbooks</text>
  <circle cx="852" cy="342" r="11" fill="#e6f7ee"/><path d="M847 342 l4 4 l7 -8" stroke="#15b371" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="876" y="347" font-size="15" fill="#14233b">Encoded in firm SOPs</text>
  <circle cx="852" cy="382" r="11" fill="#e6f7ee"/><path d="M847 382 l4 4 l7 -8" stroke="#15b371" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="876" y="387" font-size="15" fill="#14233b">Taught to new hires</text>

  <!-- caption -->
  <rect x="50" y="560" width="1100" height="64" rx="14" fill="#e8f0fe"/>
  <text x="76" y="599" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">Make it the standard. </tspan>Scale the proven workflow across the firm and bake it into your Playbooks and SOPs so it sticks.</text>
</svg>
