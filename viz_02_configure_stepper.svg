<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>Set up your first Playbook</title>
  <desc>Set the baseline first, then configure a focused Playbook: scope to one case type, select a key pain point, apply your firm's standards, and go live.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b7bdc9"/></marker>
    <marker id="arwg" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15b371"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">CONFIGURE YOUR PLAYBOOK</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">Set up your first Playbook</text>

  <!-- arrows -->
  <path d="M246 345 H276" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M472 345 H502" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M698 345 H728" stroke="#cfd4de" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <path d="M924 345 H954" stroke="#15b371" stroke-width="2.5" fill="none" marker-end="url(#arwg)"/>

  <!-- tile 1: set the baseline -->
  <rect x="50" y="210" width="196" height="270" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="148" cy="296" r="26" fill="#e8f0fe"/>
  <rect x="135" y="300" width="6" height="9" rx="1" fill="#316cf4"/>
  <rect x="145" y="293" width="6" height="16" rx="1" fill="#316cf4"/>
  <rect x="155" y="287" width="6" height="22" rx="1" fill="#316cf4"/>
  <text x="148" y="374" text-anchor="middle" font-size="17" font-weight="800" fill="#14233b">Set the baseline</text>
  <text x="148" y="404" text-anchor="middle" font-size="13" fill="#5b6573">quality · time · staff</text>

  <!-- tile 2: scope -->
  <rect x="276" y="210" width="196" height="270" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="374" cy="296" r="26" fill="#e8f0fe"/>
  <path d="M362 286 H386 L377 297 V307 L371 303 V297 Z" fill="none" stroke="#316cf4" stroke-width="2.2" stroke-linejoin="round"/>
  <text x="374" y="374" text-anchor="middle" font-size="18" font-weight="800" fill="#14233b">Scope</text>
  <text x="374" y="404" text-anchor="middle" font-size="13" fill="#5b6573">one case type</text>

  <!-- tile 3: select -->
  <rect x="502" y="210" width="196" height="270" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="600" cy="296" r="26" fill="#e8f0fe"/>
  <rect x="590" y="284" width="20" height="24" rx="2" fill="none" stroke="#316cf4" stroke-width="2"/>
  <path d="M594 295 l3 3 l6 -7" stroke="#316cf4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M594 303 h12" stroke="#316cf4" stroke-width="1.8" stroke-linecap="round"/>
  <text x="600" y="374" text-anchor="middle" font-size="18" font-weight="800" fill="#14233b">Select</text>
  <text x="600" y="404" text-anchor="middle" font-size="13" fill="#5b6573">key pain point</text>

  <!-- tile 4: apply SOPs -->
  <rect x="728" y="210" width="196" height="270" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <circle cx="826" cy="296" r="26" fill="#e8f0fe"/>
  <path d="M826 283 l12 4 v8 c0 8 -6 13 -12 16 c-6 -3 -12 -8 -12 -16 v-8 z" fill="none" stroke="#316cf4" stroke-width="2" stroke-linejoin="round"/>
  <path d="M820 297 l4 4 l8 -9" stroke="#316cf4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="826" y="374" text-anchor="middle" font-size="18" font-weight="800" fill="#14233b">Apply SOPs</text>
  <text x="826" y="404" text-anchor="middle" font-size="13" fill="#5b6573">your standards</text>

  <!-- tile 5: go live -->
  <rect x="954" y="210" width="196" height="270" rx="16" fill="#ffffff" stroke="#cfe8da" stroke-width="2" filter="url(#sh)"/>
  <circle cx="1052" cy="296" r="26" fill="#15b371"/>
  <path d="M1041 296 l7 7 l14 -16" stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1052" y="374" text-anchor="middle" font-size="18" font-weight="800" fill="#14233b">Go live</text>
  <text x="1052" y="404" text-anchor="middle" font-size="13" fill="#5b6573">runs on every case</text>

  <!-- caption -->
  <rect x="50" y="560" width="1100" height="64" rx="14" fill="#e8f0fe"/>
  <text x="76" y="599" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">Start narrow. </tspan>Set the baseline first, then scope it, shape it, apply your standards — and go live.</text>
</svg>
