<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>Refine and iterate until it is where you want it</title>
  <desc>Refine the Playbook across iterations: tweak flags, thresholds, and rules based on results and feedback, re-running each time, until quality reaches your target.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">STEP 4 · REFINE</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">Tweak it until it’s where you want it</text>

  <rect x="858" y="70" width="292" height="34" rx="17" fill="#e8f0fe"/>
  <text x="1004" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#1c50d4">↻ re-run after each tweak</text>

  <!-- baseline -->
  <line x1="140" y1="480" x2="1060" y2="480" stroke="#dbe2ee" stroke-width="2.5"/>

  <!-- target line -->
  <line x1="140" y1="236" x2="1060" y2="236" stroke="#15b371" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="1056" y="228" text-anchor="end" font-size="12.5" font-weight="700" fill="#15a564">Target — where you want it</text>

  <!-- trend line -->
  <polyline points="260,311 500,272 740,246 980,230" fill="none" stroke="#c4d3f7" stroke-width="2.5"/>

  <!-- bars -->
  <rect x="205" y="311" width="110" height="169" rx="8" fill="#9bb8f6"/>
  <text x="260" y="338" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">65%</text>
  <rect x="445" y="272" width="110" height="208" rx="8" fill="#6c93f1"/>
  <text x="500" y="299" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">80%</text>
  <rect x="685" y="246" width="110" height="234" rx="8" fill="#4a79ee"/>
  <text x="740" y="273" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">90%</text>
  <rect x="925" y="230" width="110" height="250" rx="8" fill="#15b371"/>
  <text x="980" y="257" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">96%</text>

  <!-- target-met check on v4 -->
  <circle cx="980" cy="206" r="15" fill="#e6f7ee"/><path d="M972 206 l5 5 l9 -11" stroke="#15b371" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- version labels + what changed -->
  <text x="260" y="508" text-anchor="middle" font-size="15" font-weight="800" fill="#14233b">v1</text>
  <text x="260" y="528" text-anchor="middle" font-size="13" fill="#8a93a3">baseline</text>
  <text x="500" y="508" text-anchor="middle" font-size="15" font-weight="800" fill="#14233b">v2</text>
  <text x="500" y="528" text-anchor="middle" font-size="13" fill="#8a93a3">tuned the flags</text>
  <text x="740" y="508" text-anchor="middle" font-size="15" font-weight="800" fill="#14233b">v3</text>
  <text x="740" y="528" text-anchor="middle" font-size="13" fill="#8a93a3">tightened thresholds</text>
  <text x="980" y="508" text-anchor="middle" font-size="15" font-weight="800" fill="#14233b">v4</text>
  <text x="980" y="528" text-anchor="middle" font-size="13" font-weight="700" fill="#15a564">refined SOPs · dialed in</text>

  <!-- caption -->
  <rect x="50" y="600" width="1100" height="64" rx="14" fill="#e8f0fe"/>
  <text x="76" y="639" font-size="16" fill="#3f5170"><tspan font-weight="700" fill="#1c50d4">Refine. </tspan>Tweak the flags, thresholds, and rules from results and feedback — and re-run until it’s where you want it.</text>
</svg>
