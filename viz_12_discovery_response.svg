<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif">
  <title>Draft discovery responses grounded in the record</title>
  <desc>AI drafts interrogatory answers from existing case facts, grounding them in the record and flagging what still needs client input, while identifying the key people in the defendant's discovery — responding twice as fast.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="50" y="52" font-size="15" font-weight="700" letter-spacing="2" fill="#316cf4">DISCOVERY · RESPOND FASTER</text>
  <text x="50" y="94" font-size="29" font-weight="800" fill="#14233b">Draft discovery answers grounded in the record</text>

  <!-- interrogatory document card -->
  <rect x="50" y="150" width="680" height="420" rx="16" fill="#ffffff" stroke="#e2e6ee" filter="url(#sh)"/>
  <text x="84" y="198" font-size="18" font-weight="800" fill="#14233b">Interrogatory No. 1</text>
  <text x="84" y="228" font-size="15" fill="#5b6573">State your employment history for the past ten (10)</text>
  <text x="84" y="250" font-size="15" fill="#5b6573">years preceding the incident.</text>

  <text x="84" y="300" font-size="16" font-weight="800" fill="#14233b">Answer</text>

  <!-- grounded answer block -->
  <rect x="80" y="320" width="600" height="100" rx="10" fill="#f0fbf5"/>
  <rect x="80" y="320" width="6" height="100" rx="3" fill="#15b371"/>
  <rect x="520" y="328" width="150" height="24" rx="12" fill="#dff3e7"/>
  <path d="M533 340 l4 4 l8 -9" stroke="#15a564" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="548" y="344" font-size="12" font-weight="700" fill="#15a564">from the record</text>
  <text x="104" y="372" font-size="15.5" fill="#14233b">I am employed as a registered nurse in the</text>
  <text x="104" y="396" font-size="15.5" fill="#14233b">Intensive Care Unit (ICU) at Jackson Memorial</text>
  <text x="104" y="416" font-size="15.5" fill="#14233b">Hospital for the past six years.</text>

  <!-- needs client input block -->
  <rect x="80" y="438" width="600" height="74" rx="10" fill="#fff7e8" stroke="#f0e2c6"/>
  <circle cx="112" cy="475" r="15" fill="#fdeccf"/>
  <path d="M112 468 v8 M112 481 v0.5" stroke="#c47f12" stroke-width="2.6" stroke-linecap="round"/>
  <text x="140" y="470" font-size="15" font-weight="800" fill="#14233b">Prior employers (years 7–10)</text>
  <text x="140" y="492" font-size="13.5" fill="#5b6573">Needs client input — flagged, not guessed.</text>

  <!-- side panel -->
  <rect x="760" y="150" width="390" height="420" rx="16" fill="#ffffff" stroke="#e7e9f0" filter="url(#sh)"/>
  <text x="786" y="192" font-size="18" font-weight="800" fill="#316cf4">Grounded answer</text>
  <circle cx="792" cy="222" r="6" fill="#15b371"/>
  <text x="808" y="227" font-size="13.5" fill="#5b6573">From the case record</text>
  <circle cx="792" cy="250" r="6" fill="#f6a609"/>
  <text x="808" y="255" font-size="13.5" fill="#5b6573">Needs client input</text>
  <line x1="786" y1="276" x2="1124" y2="276" stroke="#eef0f4" stroke-width="2"/>

  <text x="786" y="308" font-size="12" font-weight="700" letter-spacing="1.2" fill="#8a93a3">KEY PEOPLE IN DISCOVERY</text>

  <circle cx="804" cy="346" r="16" fill="#eef1f6"/>
  <circle cx="804" cy="341" r="5" fill="#9aa3b2"/>
  <path d="M794 356 a10 8 0 0 1 20 0 z" fill="#9aa3b2"/>
  <text x="830" y="343" font-size="15" font-weight="700" fill="#14233b">Dr. A. Reyes</text>
  <text x="830" y="362" font-size="12.5" fill="#8a93a3">Treating physician</text>

  <circle cx="804" cy="406" r="16" fill="#eef1f6"/>
  <circle cx="804" cy="401" r="5" fill="#9aa3b2"/>
  <path d="M794 416 a10 8 0 0 1 20 0 z" fill="#9aa3b2"/>
  <text x="830" y="403" font-size="15" font-weight="700" fill="#14233b">ICU Nurse Manager</text>
  <text x="830" y="422" font-size="12.5" fill="#8a93a3">Supervisor · employment</text>

  <circle cx="804" cy="466" r="16" fill="#eef1f6"/>
  <circle cx="804" cy="461" r="5" fill="#9aa3b2"/>
  <path d="M794 476 a10 8 0 0 1 20 0 z" fill="#9aa3b2"/>
  <text x="830" y="463" font-size="15" font-weight="700" fill="#14233b">HR, Jackson Memorial</text>
  <text x="830" y="482" font-size="12.5" fill="#8a93a3">Employment records</text>

  <text x="786" y="538" font-size="12.5" fill="#8a93a3">Surfaced from the defendant’s discovery.</text>

  <!-- stat ribbon -->
  <rect x="50" y="600" width="1100" height="74" rx="16" fill="#316cf4"/>
  <text x="92" y="648" font-size="34" font-weight="800" fill="#ffffff">2×</text>
  <text x="150" y="634" font-size="18" font-weight="800" fill="#ffffff">faster discovery responses</text>
  <text x="150" y="657" font-size="13.5" fill="#dbe6ff">Draft from existing case facts; flag only what still needs the client.</text>
</svg>
